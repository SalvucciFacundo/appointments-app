name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appointments_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/appointments_test

      - name: Lint
        run: npm run lint
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/appointments_test
          NEXTAUTH_SECRET: test-secret
          GOOGLE_CLIENT_ID: test-id
          GOOGLE_CLIENT_SECRET: test-secret
          RESEND_API_KEY: re_test
          CRON_SECRET: test-secret
          APP_URL: http://localhost:3000
          EMAIL_FROM: test@appointments.app
          GOOGLE_CALENDAR_CLIENT_ID: test-id
          GOOGLE_CALENDAR_CLIENT_SECRET: test-secret
